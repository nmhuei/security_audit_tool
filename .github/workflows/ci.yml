name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sat/requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 sat/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 sat/ --count --max-complexity=12 --max-line-length=120 \
                       --statistics --exit-zero

      - name: Run tests with coverage
        run: |
          cd sat
          python -m pytest tests/ -v --tb=short \
            --cov=. --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: sat/coverage.xml
          fail_ci_if_error: false

  security-lint:
    name: Security lint (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        run: |
          bandit -r sat/ -ll -x sat/tests/ \
            --skip B101,B603,B602,B404,B607,B110 \
            -f txt || true   # advisory only

  build-check:
    name: Import sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r sat/requirements.txt
      - name: Verify all modules import cleanly
        run: |
          cd sat
          python -c "
          import sys
          modules = [
            'scanner.common', 'scanner.baseline', 'scanner.secret_scan',
            'scanner.filesystem_scan', 'scanner.network_scan', 'scanner.port_scanner',
            'scanner.cve_scan', 'scanner.config_scan', 'scanner.user_scan',
            'scanner.privilege_scan', 'scanner.systemd_scan', 'scanner.docker_scan',
            'scanner.kali_tools', 'ai.analyzer', 'ai.providers',
            'remediation', 'scheduler', 'reporter.html_report',
          ]
          for m in modules:
            try:
              __import__(m)
              print(f'  ✅  {m}')
            except ImportError as e:
              print(f'  ❌  {m}: {e}', file=sys.stderr)
              sys.exit(1)
          print(f'\\n  All {len(modules)} modules imported successfully.')
          "
